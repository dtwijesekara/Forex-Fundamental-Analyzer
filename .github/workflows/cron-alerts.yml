name: Cron — Alerts

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check event risk warnings and send Telegram alerts
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120 \
            "${{ secrets.APP_URL }}/api/cron/alerts")
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json
          [ "$HTTP_CODE" = "200" ] || exit 1
