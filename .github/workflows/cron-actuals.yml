name: Cron — Fast Actuals

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Patch missing actual values for recent T1/T2 events
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 180 \
            "${{ secrets.APP_URL }}/api/cron/actuals")
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json
          [ "$HTTP_CODE" = "200" ] || exit 1
