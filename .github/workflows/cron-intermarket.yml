name: Cron — Intermarket

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Refresh intermarket prices (DXY, Gold, Oil, S&P500, VIX, US10Y)
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120 \
            "${{ secrets.APP_URL }}/api/cron/intermarket")
          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json
          [ "$HTTP_CODE" = "200" ] || exit 1
